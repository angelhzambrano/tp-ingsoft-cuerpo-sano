{% extends 'base.html' %}

{% block title %}Sin Asignación - Cuerpo Sano{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="flex items-center justify-center min-h-[400px]">
        <div class="card bg-yellow-50 shadow-xl border-2 border-yellow-200 max-w-md">
            <div class="card-body text-center p-8">
                <div class="text-6xl mb-4">⚠️</div>
                <h2 class="card-title text-2xl text-yellow-900 mb-2">No Asignado</h2>
                <p class="text-yellow-800 mb-6">
                    {{ mensaje }}
                </p>
                <p class="text-sm text-yellow-700 mb-6">
                    Por favor, contacta al administrador para que te registre como entrenador en el sistema.
                </p>
                <div class="card-actions justify-center gap-2">
                    <a href="/" class="btn btn-primary">
                        🏠 Ir al Inicio
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
