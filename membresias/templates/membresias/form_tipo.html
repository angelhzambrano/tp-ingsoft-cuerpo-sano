{% extends "base.html" %}

{% block title %}{% if tipo %}Editar{% else %}Nuevo{% endif %} Tipo de Membresía{% endblock %}

{% block content %}
<div class="container mx-auto p-4 max-w-2xl">
    <h1 class="text-3xl font-bold mb-6">
        {% if tipo %}Editar Tipo de Membresía{% else %}Nuevo Tipo de Membresía{% endif %}
    </h1>

    <form method="post" class="space-y-4">
        {% csrf_token %}

        <div class="form-control">
            <label class="label">
                <span class="label-text">Nombre *</span>
            </label>
            <input type="text" name="nombre" class="input input-bordered w-full"
                   value="{% if tipo %}{{ tipo.nombre }}{% endif %}" required>
        </div>

        <div class="form-control">
            <label class="label">
                <span class="label-text">Descripción</span>
            </label>
            <textarea name="descripcion" class="textarea textarea-bordered w-full" rows="4">{% if tipo %}{{ tipo.descripcion }}{% endif %}</textarea>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Precio *</span>
                </label>
                <input type="number" name="precio" class="input input-bordered w-full"
                       value="{% if tipo %}{{ tipo.precio }}{% endif %}" step="0.01" min="0.01" required>
            </div>

            <div class="form-control">
                <label class="label">
                    <span class="label-text">Duración (días) *</span>
                </label>
                <input type="number" name="duracion_dias" class="input input-bordered w-full"
                       value="{% if tipo %}{{ tipo.duracion_dias }}{% endif %}" min="1" required>
            </div>
        </div>

        <div class="border-t border-neutral-200 my-4"></div>

        <div class="flex gap-2 justify-end">
            <a href="{% url 'membresias:lista_tipos' %}" class="btn-ghost px-4 py-2 rounded-md hover:opacity-90">Cancelar</a>
            <button type="submit" class="btn-primary px-4 py-2 rounded-md font-semibold text-white hover:opacity-90">Guardar</button>
        </div>
    </form>
</div>
{% endblock %}
