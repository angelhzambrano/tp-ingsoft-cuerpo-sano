<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - Cuerpo Sano</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
</head>
<body class="bg-base-200">
    <div class="min-h-screen flex items-center justify-center">
        <div class="card w-96 bg-base-100 shadow-xl">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Cuerpo Sano</h2>
                <p class="text-center text-sm mb-6">Ingresá con tu cuenta de staff</p>

                {% if form.non_field_errors %}
                <div class="alert alert-error mb-4">
                    <div>
                        <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current flex-shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l-2-2m0 0l-2-2m2 2l2-2m-2 2l-2 2m2-2l2 2M9 12H3m0 0v6m0-6L3 6m0 0h6m0 0v6m0-6l6 0m0 0v6m0-6l-6 0"/>
                        </svg>
                    </div>
                    {% for error in form.non_field_errors %}
                    <div>{{ error }}</div>
                    {% endfor %}
                </div>
                {% endif %}

                <form method="post" class="space-y-4">
                    {% csrf_token %}

                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">Usuario</span>
                        </label>
                        {{ form.username }}
                        {% if form.username.errors %}
                        <label class="label">
                            <span class="label-text-alt text-error">{{ form.username.errors.0 }}</span>
                        </label>
                        {% endif %}
                    </div>

                    <div class="form-control">
                        <label class="label">
                            <span class="label-text">Contraseña</span>
                        </label>
                        {{ form.password }}
                        {% if form.password.errors %}
                        <label class="label">
                            <span class="label-text-alt text-error">{{ form.password.errors.0 }}</span>
                        </label>
                        {% endif %}
                    </div>

                    <button type="submit" class="btn btn-primary w-full">Ingresar</button>
                </form>
            </div>
        </div>
    </div>

    <style>
        input[type="text"], input[type="password"] {
            @apply input input-bordered w-full;
        }
    </style>
</body>
</html>
